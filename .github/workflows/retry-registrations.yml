name: Retry Registrations

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: Optional checkout session id to retry directly
        required: false
        default: ""
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: retry-registrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LUMAZCASH_BASE_URL: ${{ secrets.LUMAZCASH_BASE_URL }}
      LUMAZCASH_ADMIN_PASSWORD: ${{ secrets.LUMAZCASH_ADMIN_PASSWORD }}
      LUMAZCASH_RETRY_SESSION_ID: ${{ github.event.inputs.session_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Retry due registrations
        run: node scripts/retry-registrations.mjs
