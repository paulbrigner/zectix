name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: production-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      SMOKE_MAX_ATTEMPTS: ${{ vars.SMOKE_MAX_ATTEMPTS }}
      SMOKE_RETRY_DELAY_SECONDS: ${{ vars.SMOKE_RETRY_DELAY_SECONDS }}
      SMOKE_REQUEST_TIMEOUT_SECONDS: ${{ vars.SMOKE_REQUEST_TIMEOUT_SECONDS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke checks
        run: node scripts/check-production.mjs
