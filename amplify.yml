version: 1
frontend:
  runtime:
    nodejs: 22
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - if [ -f package-lock.json ]; then npm ci; else npm install; fi
    build:
      commands:
        - rm -f .env.production
        - env | grep -e APP_BASE_PATH >> .env.production || true
        - env | grep -e ADMIN_PASSWORD_HASH >> .env.production || true
        - env | grep -e ADMIN_SESSION_SECRET >> .env.production || true
        - env | grep -e SESSION_VIEWER_SECRET >> .env.production || true
        - env | grep -e DYNAMODB_TABLE_NAME >> .env.production || true
        - env | grep -e AWS_REGION >> .env.production || true
        - env | grep -e LUMA_API_KEY >> .env.production || true
        - env | grep -e CIPHERPAY_API_KEY >> .env.production || true
        - env | grep -e CIPHERPAY_WEBHOOK_SECRET >> .env.production || true
        - env | grep -e CIPHERPAY_NETWORK >> .env.production || true
        - env | grep -e CIPHERPAY_API_BASE_URL >> .env.production || true
        - env | grep -e CIPHERPAY_CHECKOUT_BASE_URL >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
